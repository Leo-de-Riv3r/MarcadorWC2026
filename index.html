<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: #1a1a2e;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Animación RGB en loop infinito perfecto */
        @keyframes cambioColorNeon {
            0% {
                border-color: rgb(0, 243, 255);
                box-shadow: 0 0 25px rgba(0, 243, 255, 0.45), inset 0 0 10px rgba(0, 243, 255, 0.1);
            }
            20% {
                border-color: rgb(255, 0, 128);
                box-shadow: 0 0 25px rgba(255, 0, 128, 0.45), inset 0 0 10px rgba(255, 0, 128, 0.1);
            }
            40% {
                border-color: rgb(157, 0, 255);
                box-shadow: 0 0 25px rgba(157, 0, 255, 0.45), inset 0 0 10px rgba(157, 0, 255, 0.1);
            }
            60% {
                border-color: rgb(0, 255, 170);
                box-shadow: 0 0 25px rgba(0, 255, 170, 0.45), inset 0 0 10px rgba(0, 255, 170, 0.1);
            }
            80% {
                border-color: rgb(255, 215, 0);
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.45), inset 0 0 10px rgba(255, 215, 0, 0.1);
            }
            100% {
                border-color: rgb(0, 243, 255);
                box-shadow: 0 0 25px rgba(0, 243, 255, 0.45), inset 0 0 10px rgba(0, 243, 255, 0.1);
            }
        }

        .marcador-box {
            background: rgba(255, 255, 255, 0.94);
            border: 4px solid rgb(0, 243, 255);
            border-radius: 2.5vw; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            padding: 1.5% 2.5%;
            height: auto;
            aspect-ratio: 10 / 1.4; /* Ligeramente más alto para albergar las fuentes gigantes */
            animation: cambioColorNeon 12s linear infinite;
        }

        /* Bloques de equipo y bandera */
        .team-block {
            display: flex;
            align-items: center;
            gap: 2vw;
            flex: 1;
        }
        .team-block.home {
            justify-content: flex-start;
        }
        .team-block.away {
            justify-content: flex-end;
        }
        
        /* Fuentes notablemente más grandes */
        .team { 
            font-weight: 900; 
            font-size: 5.6vw; 
            text-transform: uppercase; 
            letter-spacing: 0.1vw;
            color: #1a1a2e;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.08);
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        /* Estado: Equipo Ganador (Verde Esmeralda) */
        .team-block.winner-block .team {
            color: rgb(0, 180, 90);
            text-shadow: 0 0 10px rgba(0, 255, 120, 0.25);
        }
        .team-block.winner-block .flag {
            box-shadow: 0 0 12px rgba(0, 255, 120, 0.5);
            border: 2px solid rgb(0, 180, 90);
        }

        /* Estado: Equipo Perdedor (Rojo Vibrante) */
        .team-block.loser-block .team {
            color: rgb(235, 30, 60);
            text-shadow: 0 0 10px rgba(255, 30, 60, 0.25);
        }
        .team-block.loser-block .flag {
            box-shadow: 0 0 12px rgba(255, 30, 60, 0.4);
            border: 2px solid rgb(235, 30, 60);
        }
        
        /* Banderas mas grandes y con bordes responsivos */
        .flag { 
            width: 12vw; 
            max-width: 130px;
            height: auto; 
            object-fit: contain; 
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
            transition: box-shadow 0.4s ease, border 0.4s ease;
            box-sizing: border-box;
            border: 2px solid transparent;
        }
        .yellow-card { font-size: 3.5vw; margin: 0 0.3vw; line-height: 1; }
        
        /* Contenedor central */
        .score-container {
            display: flex;
            align-items: center;
            height: 100%;
            justify-content: center;
        }
        .score-container.pen {
            flex-direction: column;
            gap: 2px;
        }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Goles agrandados con fuentes potentes */
        .score { 
            font-size: 6.8vw;
            font-weight: 900;
            color: #ffffff; 
            background: linear-gradient(135deg, rgb(0, 198, 255) 0%, rgb(0, 114, 255) 100%); 
            height: 10vw;
            width: 10vw;
            max-height: 95px;
            max-width: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18%;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
            text-shadow: 1px 2px 4px rgba(0,0,0,0.25);
        }
        
        /* Bloque central para el tiempo transcurrido agrandado */
        .time-center-box {
            background-color: #f4f6f9;
            color: rgb(106, 13, 173);
            font-weight: 900;
            font-size: 4vw;
            height: 10vw;
            max-height: 95px;
            padding: 0 2.5vw;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            letter-spacing: 0.05vw;
            border-radius: 6px;
            margin: 0 6px;
        }
        
        .no-matches {
            background: rgba(255, 255, 255, 0.95);
            padding: 3vw 6vw;
            border-radius: 2vw;
            font-size: 4.5vw;
            font-weight: bold;
            text-align: center;
            color: #1a1a2e;
            border: 3px solid rgb(255, 0, 85);
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.15);
        }

        @media (min-width: 1200px) {
            .team { font-size: 72px; }
            .time-center-box { font-size: 48px; }
            .score { font-size: 85px; }
        }
    </style>
</head>
<body>

<div id="marcador-container" class="container">
    <div class="no-matches">Cargando partidos...</div>
</div>

<script>
    const API = 'https://sportscore.com/api/widget';
    let cachedMatches = {};
    let allSlugs = [];
    let refreshCounter = 0;

    async function fetchJSON(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    }

    async function actualizarCache() {
        if (allSlugs.length === 0) return;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const results = await Promise.allSettled(
            allSlugs.map(slug =>
                fetch(API + '/team/?sport=football&slug=' + slug + '&limit=30', { signal: controller.signal })
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null)
            )
        );
        clearTimeout(timeout);
        const byKey = {};
        results.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean).forEach(res => {
            (res.matches || []).forEach(m => {
                if (m.url) {
                    const existing = byKey[m.url];
                    if (!existing || m.time > existing.time) byKey[m.url] = m;
                }
            });
        });
        cachedMatches = byKey;
    }

    async function inicializar() {
        try {
            const data = await fetchJSON(API + '/standings/?sport=football&slug=fifa-world-cup');
            allSlugs = [...new Set(data.tables.flatMap(t => t.rows.map(r => r.team_slug)))];

            await actualizarCache();
            await refrescar();
        } catch (e) {
            console.error('Init error:', e);
            document.getElementById('marcador-container').innerHTML =
                '<div class="no-matches">Error al cargar</div>';
        }
    }

    async function refrescar() {
        const container = document.getElementById('marcador-container');

        refreshCounter++;
        if (refreshCounter % 10 === 0) {
            actualizarCache().catch(() => {});
        }

        try {
            const actuales = Object.values(cachedMatches).filter(m =>
                ['live', 'halftime', 'et', 'extratime', 'pen'].includes(m.status)
            );

            if (actuales.length > 0) {
                const detalles = await Promise.all(actuales.map(m =>
                    fetchJSON(API + '/match/?sport=football&slug=' + m.url.replace('/football/match/', '').replace('/', ''))
                        .then(j => ({ slug: m.url, match: j.match }))
                        .catch(() => ({ slug: m.url, match: null }))
                ));
                const minMap = {};
                const statusMap = {};
                const scoreMap = {};
                detalles.forEach(d => {
                    if (d.match) {
                        minMap[d.slug] = d.match.live_minute;
                        statusMap[d.slug] = d.match.status;
                        if (d.match.home_score != null) scoreMap[d.slug] = {
                            hs: String(d.match.home_score),
                            as: String(d.match.away_score)
                        };
                    }
                });
                mostrar(container, actuales.map(m => {
                    const slug = m.url;
                    const min = minMap[slug] != null ? minMap[slug] : null;
                    const hs = scoreMap[slug] ? scoreMap[slug].hs : String(m.home_score ?? '0');
                    const as = scoreMap[slug] ? scoreMap[slug].as : String(m.away_score ?? '0');
                    const st = statusMap[slug];
                    const isHalftime = st === 'halftime';
                    const isPEN = st === 'pen' || st === 'penalty' || min === "PEN";
                    const penGoals = (m.incidents || []).reduce((acc, inc) => {
                        if (inc.type === "Penalty shootout goal") {
                            if (inc.side === "home") acc.h++;
                            else if (inc.side === "away") acc.a++;
                        }
                        return acc;
                    }, { h: 0, a: 0 });
                    const hasPenScore = penGoals.h + penGoals.a > 0;
                    const yellows = (m.incidents || []).filter(i => i.type === "Yellow card")
                        .reduce((acc, i) => {
                            if (i.side === "home") acc.h++;
                            else if (i.side === "away") acc.a++;
                            return acc;
                        }, { h: 0, a: 0 });
                    return {
                        homeTeam: traducirEquipo(m.home),
                        awayTeam: traducirEquipo(m.away),
                        homeGoals: hs, awayGoals: as,
                        minutos: isPEN
                            ? (hasPenScore ? `PEN ${penGoals.h}-${penGoals.a}` : "PEN")
                            : (isHalftime ? "HT" : (min != null ? (isNaN(min) ? min : min + "'") : "1'")),
                        estado: "EN VIVO",
                        isPEN: isPEN,
                        yellowHome: yellows.h,
                        yellowAway: yellows.a
                    };
                }));
                return;
            }

            const terminados = Object.values(cachedMatches)
                .filter(m => m.status === 'finished' && m.time)
                .sort((a, b) => b.time.localeCompare(a.time));

            if (terminados.length > 0) {
                const ultimo = terminados[0];
                mostrar(container, [{
                    homeTeam: traducirEquipo(ultimo.home),
                    awayTeam: traducirEquipo(ultimo.away),
                    homeGoals: String(ultimo.home_score ?? '0'),
                    awayGoals: String(ultimo.away_score ?? '0'),
                    minutos: "FT",
                    estado: "FT"
                }]);
                return;
            }

            container.innerHTML = '<div class="no-matches">⚠️ Sin partidos ahora</div>';

        } catch (e) {
            console.error('Refresh error:', e);
            container.innerHTML = '<div class="no-matches">⚠️ Error</div>';
        }
    }

    function mostrar(container, partidos) {
        container.innerHTML = '';
        partidos.forEach(m => {
            const displayTime = m.minutos || "--";
            
            const golesHome = parseInt(m.homeGoals) || 0;
            const golesAway = parseInt(m.awayGoals) || 0;
            
            // Lógica completa para aplicar clases de ganador y perdedor a todo el bloque
            let homeBlockClass = '';
            let awayBlockClass = '';
            
            if (golesHome > golesAway) {
                homeBlockClass = 'winner-block';
                awayBlockClass = 'loser-block';
            } else if (golesAway > golesHome) {
                homeBlockClass = 'loser-block';
                awayBlockClass = 'winner-block';
            }

            container.innerHTML += `
                <div class="marcador-box">
                    <!-- Local -->
                    <div class="team-block home ${homeBlockClass}">
                        ${banderaEquipo(m.homeTeam)}
                        ${m.yellowHome ? `<span class="yellow-card">🟨${m.yellowHome}</span>` : ""}
                        <div class="team">${m.homeTeam}</div>
                    </div>
                    
                    <!-- Contenedor de marcador central -->
                    <div class="score-container${m.isPEN ? ' pen' : ''}">
                        ${m.isPEN ? `
                        <div class="score-row">
                            <div class="score">${m.homeGoals}</div>
                            <div class="score">${m.awayGoals}</div>
                        </div>` : `
                        <div class="score">${m.homeGoals}</div>`}
                        <div class="time-center-box">${displayTime}</div>
                        ${m.isPEN ? '' : `
                        <div class="score">${m.awayGoals}</div>`}
                    </div>
                    
                    <!-- Visitante -->
                    <div class="team-block away ${awayBlockClass}">
                        <div class="team">${m.awayTeam}</div>
                        ${m.yellowAway ? `<span class="yellow-card">🟨${m.yellowAway}</span>` : ""}
                        ${banderaEquipo(m.awayTeam)}
                    </div>
                </div>
            `;
        });
    }

    function traducirEquipo(nombre) {
        const t = {
            "Ecuador": "ECU", "Curacao": "CUW", "Netherlands": "NED", "Sweden": "SWE", "United States": "USA", "South Korea": "KOR",
            "Japan": "JPN", "Germany": "GER", "Brazil": "BRA", "Argentina": "ARG",
            "France": "FRA", "England": "ENG", "Spain": "ESP", "Portugal": "POR",
            "Mexico": "MEX", "Canada": "CAN", "Belgium": "BEL", "Croatia": "CRO",
            "Morocco": "MAR", "Senegal": "SEN", "Switzerland": "SUI", "Uruguay": "URU",
            "Egypt": "EGY", "New Zealand": "NZL", "Czech Republic": "CZE", "South Africa": "RSA",
            "Bosnia and Herzegovina": "BIH", "Qatar": "QAT", "Haiti": "HAI", "Scotland": "SCO",
            "Australia": "AUS", "Paraguay": "PAR", "Turkey": "TUR", "Ivory Coast": "CIV",
            "Tunisia": "TUN", "Iran": "IRN", "Cape Verde": "CPV", "Saudi Arabia": "KSA",
            "Iraq": "IRQ", "Norway": "NOR", "Algeria": "ALG", "Austria": "AUT",
            "Jordan": "JOR", "Colombia": "COL", "DR Congo": "COD", "Uzbekistan": "UZB",
            "Ghana": "GHA", "Panama": "PAN",
            "Czechia": "CZE", "Turkiye": "TUR", "Türkiye": "TUR",
            "Korea Republic": "KOR", "IR Iran": "IRN",
            "Côte d'Ivoire": "CIV", "Cabo Verde": "CPV",
            "Congo DR": "COD", "Curaçao": "CUW"
        };
        return t[nombre] || nombre;
    }

    function banderaEquipo(codigo) {
        const mapa = {
            "ARG": "ar", "AUS": "au", "AUT": "at", "BEL": "be", "BIH": "ba",
            "BRA": "br", "CAN": "ca", "CIV": "ci", "COD": "cd", "COL": "co",
            "CPV": "cv", "CRO": "hr", "CUW": "cw", "CZE": "cz", "ECU": "ec",
            "EGY": "eg", "ESP": "es", "FRA": "fr", "GER": "de", "GHA": "gh",
            "HAI": "ht", "IRN": "ir", "IRQ": "iq", "JPN": "jp", "JOR": "jo",
            "KOR": "kr", "KSA": "sa", "MAR": "ma", "MEX": "mx", "NED": "nl",
            "NZL": "nz", "NOR": "no", "PAN": "pa", "PAR": "py", "POR": "pt",
            "QAT": "qa", "RSA": "za", "SEN": "sn", "SUI": "ch", "SWE": "se",
            "TUN": "tn", "TUR": "tr", "USA": "us", "URU": "uy", "UZB": "uz"
        };
        const iso = mapa[codigo];
        if (codigo === "ENG") return `<img src="https://flagcdn.com/gb-eng.svg" class="flag" alt="">`;
        if (codigo === "SCO") return `<img src="https://flagcdn.com/gb-sct.svg" class="flag" alt="">`;
        if (!iso) return "";
        return `<img src="https://flagcdn.com/${iso}.svg" class="flag" alt="">`;
    }

    inicializar();
    setInterval(refrescar, 30000);
</script>
</body>
</html>
