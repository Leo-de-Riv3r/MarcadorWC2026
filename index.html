<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: white;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Estilo principal responsivo con Gradiente y Neón */
        .marcador-box {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2a 100%);
            border: 2px solid #00f3ff;
            border-radius: 2vw; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 100%;
            /* Resplandor Neón de fondo */
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 15px rgba(186, 0, 255, 0.2);
            box-sizing: border-box;
            overflow: hidden;
            padding: 1% 2%;
            height: auto;
            aspect-ratio: 10 / 1.3; 
        }

        /* Bloques de equipo y bandera flexibles */
        .team-block {
            display: flex;
            align-items: center;
            gap: 1.5vw;
            flex: 1;
        }
        .team-block.home {
            justify-content: flex-start;
        }
        .team-block.away {
            justify-content: flex-end;
        }
        
        .team { 
            font-weight: 900; 
            font-size: 4.8vw; 
            text-transform: uppercase; 
            letter-spacing: 0.1vw;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }
        
        /* Banderas maximizadas */
        .flag { 
            width: 10vw; 
            max-width: 105px;
            height: auto; 
            object-fit: contain; 
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }

        /* Puntos decorativos estilo LED Neón */
        .dot {
            width: 1.5vw;
            height: 1.5vw;
            max-width: 12px;
            max-height: 12px;
            min-width: 6px;
            min-height: 6px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot.blue { 
            background-color: #00f3ff; 
            box-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }
        .dot.red { 
            background-color: #ff0055; 
            box-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055;
        }
        
        /* Contenedor central de Goles y Tiempo */
        .score-container {
            display: flex;
            align-items: center;
            height: 100%;
            justify-content: center;
        }

        /* Bloques de Goles con Gradiente Neón de Alto Contraste */
        .score { 
            font-size: 5.8vw;
            font-weight: 900;
            color: #03030a; /* Súper oscuro para contraste óptimo */
            background: linear-gradient(180deg, #00f3ff 0%, #00ffaa 100%); 
            height: 8.5vw;
            width: 8.5vw;
            max-height: 75px;
            max-width: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16%;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
        }
        
        /* Bloque central para el tiempo transcurrido (Brillo morado) */
        .time-center-box {
            background-color: #000000;
            color: #ba00ff;
            text-shadow: 0 0 8px #ba00ff;
            font-weight: 900;
            font-size: 3.4vw;
            height: 8.5vw;
            max-height: 75px;
            padding: 0 2vw;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            letter-spacing: 0.05vw;
        }
        
        .no-matches {
            background: rgba(13, 13, 26, 0.9);
            padding: 3vw 6vw;
            border-radius: 2vw;
            font-size: 4vw;
            font-weight: bold;
            text-align: center;
            border: 2px solid #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .powered {
            font-size: 1.8vw;
            color: rgba(0, 243, 255, 0.4);
            text-align: center;
            margin-top: 1%;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
        }
        .powered a { color: rgba(0, 243, 255, 0.6); text-decoration: none; }

        @media (min-width: 1200px) {
            .team { font-size: 58px; }
            .time-center-box { font-size: 40px; }
            .score { font-size: 70px; }
            .powered { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="marcador-container" class="container">
    <div class="no-matches">Cargando partidos...</div>
</div>

<script>
    const API = 'https://sportscore.com/api/widget';
    let cachedMatches = {};
    let allSlugs = [];
    let refreshCounter = 0;

    async function fetchJSON(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    }

    async function actualizarCache() {
        if (allSlugs.length === 0) return;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const results = await Promise.allSettled(
            allSlugs.map(slug =>
                fetch(API + '/team/?sport=football&slug=' + slug + '&limit=30', { signal: controller.signal })
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null)
            )
        );
        clearTimeout(timeout);
        const byKey = {};
        results.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean).forEach(res => {
            (res.matches || []).forEach(m => {
                if (m.url) {
                    const existing = byKey[m.url];
                    if (!existing || m.time > existing.time) byKey[m.url] = m;
                }
            });
        });
        cachedMatches = byKey;
    }

    async function inicializar() {
        try {
            const data = await fetchJSON(API + '/standings/?sport=football&slug=fifa-world-cup');
            allSlugs = [...new Set(data.tables.flatMap(t => t.rows.map(r => r.team_slug)))];

            await actualizarCache();
            await refrescar();
        } catch (e) {
            console.error('Init error:', e);
            document.getElementById('marcador-container').innerHTML =
                '<div class="no-matches">Error al cargar</div>';
        }
    }

    async function refrescar() {
        const container = document.getElementById('marcador-container');

        refreshCounter++;
        if (refreshCounter % 10 === 0) {
            actualizarCache().catch(() => {});
        }

        try {
            const actuales = Object.values(cachedMatches).filter(m =>
                ['live', 'halftime'].includes(m.status)
            );

            if (actuales.length > 0) {
                const detalles = await Promise.all(actuales.map(m =>
                    fetchJSON(API + '/match/?sport=football&slug=' + m.url.replace('/football/match/', '').replace('/', ''))
                        .then(j => ({ slug: m.url, match: j.match }))
                        .catch(() => ({ slug: m.url, match: null }))
                ));
                const minMap = {};
                const statusMap = {};
                const scoreMap = {};
                detalles.forEach(d => {
                    if (d.match) {
                        minMap[d.slug] = d.match.live_minute;
                        statusMap[d.slug] = d.match.status;
                        if (d.match.home_score != null) scoreMap[d.slug] = {
                            hs: String(d.match.home_score),
                            as: String(d.match.away_score)
                        };
                    }
                });
                mostrar(container, actuales.map(m => {
                    const slug = m.url;
                    const min = minMap[slug] != null ? minMap[slug] : null;
                    const hs = scoreMap[slug] ? scoreMap[slug].hs : String(m.home_score ?? '0');
                    const as = scoreMap[slug] ? scoreMap[slug].as : String(m.away_score ?? '0');
                    const st = statusMap[slug];
                    const isHalftime = st === 'halftime';
                    return {
                        homeTeam: traducirEquipo(m.home),
                        awayTeam: traducirEquipo(m.away),
                        homeGoals: hs, awayGoals: as,
                        minutos: isHalftime ? "HT" : (min != null ? min + "'" : "1'"),
                        estado: "EN VIVO"
                    };
                }));
                return;
            }

            const terminados = Object.values(cachedMatches)
                .filter(m => m.status === 'finished' && m.time)
                .sort((a, b) => b.time.localeCompare(a.time));

            if (terminados.length > 0) {
                const ultimo = terminados[0];
                mostrar(container, [{
                    homeTeam: traducirEquipo(ultimo.home),
                    awayTeam: traducirEquipo(ultimo.away),
                    homeGoals: String(ultimo.home_score ?? '0'),
                    awayGoals: String(ultimo.away_score ?? '0'),
                    minutos: "FT",
                    estado: "FT"
                }]);
                return;
            }

            container.innerHTML = '<div class="no-matches">⚠️ Sin partidos ahora</div>';

        } catch (e) {
            console.error('Refresh error:', e);
            container.innerHTML = '<div class="no-matches">⚠️ Error</div>';
        }
    }

    function mostrar(container, partidos) {
        container.innerHTML = '';
        partidos.forEach(m => {
            const displayTime = m.minutos || "--";

            container.innerHTML += `
                <div class="marcador-box">
                    <div class="team-block home">
                        ${banderaEquipo(m.homeTeam)}
                        <span class="dot blue"></span>
                        <div class="team">${m.homeTeam}</div>
                    </div>
                    
                    <div class="score-container">
                        <div class="score">${m.homeGoals}</div>
                        <div class="time-center-box">${displayTime}</div>
                        <div class="score">${m.awayGoals}</div>
                    </div>
                    
                    <div class="team-block away">
                        <div class="team">${m.awayTeam}</div>
                        <span class="dot red"></span>
                        ${banderaEquipo(m.awayTeam)}
                    </div>
                </div>
            `;
        });
        container.innerHTML += '<div class="powered">Datos por <a href="https://sportscore.com" target="_blank" rel="dofollow">SportScore</a></div>';
    }

    function traducirEquipo(nombre) {
        const t = {
            "Ecuador": "ECU", "Curacao": "CUW", "Netherlands": "NED", "Sweden": "SWE", "United States": "USA", "South Korea": "KOR",
            "Japan": "JPN", "Germany": "GER", "Brazil": "BRA", "Argentina": "ARG",
            "France": "FRA", "England": "ENG", "Spain": "ESP", "Portugal": "POR",
            "Mexico": "MEX", "Canada": "CAN", "Belgium": "BEL", "Croatia": "CRO",
            "Morocco": "MAR", "Senegal": "SEN", "Switzerland": "SUI", "Uruguay": "URU",
            "Egypt": "EGY", "New Zealand": "NZL", "Czech Republic": "CZE", "South Africa": "RSA",
            "Bosnia and Herzegovina": "BIH", "Qatar": "QAT", "Haiti": "HAI", "Scotland": "SCO",
            "Australia": "AUS", "Paraguay": "PAR", "Turkey": "TUR", "Ivory Coast": "CIV",
            "Tunisia": "TUN", "Iran": "IRN", "Cape Verde": "CPV", "Saudi Arabia": "KSA",
            "Iraq": "IRQ", "Norway": "NOR", "Algeria": "ALG", "Austria": "AUT",
            "Jordan": "JOR", "Colombia": "COL", "DR Congo": "COD", "Uzbekistan": "UZB",
            "Ghana": "GHA", "Panama": "PAN",
            "Czechia": "CZE", "Turkiye": "TUR", "Türkiye": "TUR",
            "Korea Republic": "KOR", "IR Iran": "IRN",
            "Côte d'Ivoire": "CIV", "Cabo Verde": "CPV",
            "Congo DR": "COD", "Curaçao": "CUW"
        };
        return t[nombre] || nombre;
    }

    function banderaEquipo(codigo) {
        const mapa = {
            "ARG": "ar", "AUS": "au", "AUT": "at", "BEL": "be", "BIH": "ba",
            "BRA": "br", "CAN": "ca", "CIV": "ci", "COD": "cd", "COL": "co",
            "CPV": "cv", "CRO": "hr", "CUW": "cw", "CZE": "cz", "ECU": "ec",
            "EGY": "eg", "ESP": "es", "FRA": "fr", "GER": "de", "GHA": "gh",
            "HAI": "ht", "IRN": "ir", "IRQ": "iq", "JPN": "jp", "JOR": "jo",
            "KOR": "kr", "KSA": "sa", "MAR": "ma", "MEX": "mx", "NED": "nl",
            "NZL": "nz", "NOR": "no", "PAN": "pa", "PAR": "py", "POR": "pt",
            "QAT": "qa", "RSA": "za", "SEN": "sn", "SUI": "ch", "SWE": "se",
            "TUN": "tn", "TUR": "tr", "USA": "us", "URU": "uy", "UZB": "uz"
        };
        const iso = mapa[codigo];
        if (codigo === "ENG") return `<img src="https://flagcdn.com/gb-eng.svg" class="flag" alt="">`;
        if (codigo === "SCO") return `<img src="https://flagcdn.com/gb-sct.svg" class="flag" alt="">`;
        if (!iso) return "";
        return `<img src="https://flagcdn.com/${iso}.svg" class="flag" alt="">`;
    }

    inicializar();
    setInterval(refrescar, 30000);
</script>
</body>
</html>
